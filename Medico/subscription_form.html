<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Form</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #eef2f7;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .form-container {
            background: white;
            color: #333;
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #0077b6;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            background:#0077b6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #005f8e;
        }
        .success {
            display: none;
            background: #28a745;
            color: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }
        /* Back Button (Left Side Center) */
.back-button {
    position: fixed;
    top: 50%;
    left: 100px;
    transform: translateY(-50%);
    background: #0077b6;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s ease;
    text-decoration: none;
}
.back-button:hover {
    background: #005f8e;
}
    </style>
</head>
<body>
    <a href="subscribe.php" class="back-button">← Back to Subscribe</a>

    <div class="form-container">
        <h2>Subscription Form</h2>
        <form id="subscriptionForm">
            <label>Full Name:</label>
            <input type="text" id="name" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Phone Number:</label>
            <input type="tel" id="phone" required>

            <label>Selected Plan:</label>
            <input type="text" id="selectedPlan" readonly>

            <button type="submit" class="btn">Confirm Subscription</button>
        </form>

        <div class="success" id="successMessage">
            🎉 Thank you for subscribing! You will receive updates in your email.
        </div>
    </div>

    <script>
        // Get selected plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'Not Selected';
        document.getElementById('selectedPlan').value = plan.charAt(0).toUpperCase() + plan.slice(1) + " Plan";

        // Handle form submission
        document.getElementById('subscriptionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                window.location.href = 'product_page1.php'; // Redirect to home page after 3 seconds
            }, 3000);
        });
    </script>

</body>
</html>
